<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASR Результаты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .controls {
            padding: 20px 30px;
            background: #f7f9fc;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-info {
            background: #3498db;
            color: white;
        }

        .btn-info:hover {
            background: #2980b9;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .results-list {
            padding: 30px;
        }

        .result-card {
            background: white;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            margin-bottom: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-name {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            font-family: monospace;
        }

        .result-stats {
            display: flex;
            gap: 15px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #95a5a6;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 ASR Результаты</h1>
            <p>Управление результатами транскрипции и их загрузка</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="refreshResults()">
                🔄 Обновить
            </button>
            <button class="btn btn-danger" onclick="deleteAllResults()">
                🗑️ Удалить все
            </button>
        </div>

        <div class="results-list" id="resultsList">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadResults() {
            try {
                const response = await fetch('/api/results');
                const data = await response.json();
                displayResults(data.results);
            } catch (error) {
                console.error('Error loading results:', error);
                showToast('Error loading results', 'error');
                document.getElementById('resultsList').innerHTML = `
                    <div class="empty-state">
                        <p>❌ Error loading results</p>
                        <button class="btn btn-primary" onclick="refreshResults()">Try Again</button>
                    </div>
                `;
            }
        }

        function displayResults(results) {
            const container = document.getElementById('resultsList');

            if (!results || results.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div>📭</div>
                        <h3>Ничего нет</h3>
                        <p>Результаты расшифровки пока недоступны.</p>
                        <p style="margin-top: 20px;"><a href="/">Начните запись</a>, чтобы увидеть результаты здесь!  </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = results.map(result => `
                <div class="result-card">
                    <div class="result-header">
                        <div>
                            <div class="result-name">📁 ${escapeHtml(result.name)}</div>
                            <div class="result-stats">
                                <span>📝 ${result.transcript_count} фраз</span>
                                <span>📅 ${escapeHtml(result.created)}</span>
                            </div>
                        </div>
                        <div class="result-actions">
                            ${result.has_json ? `<button class="btn btn-success btn-sm" onclick="downloadFile('${result.name}', 'json')">📄 Скачать JSON</button>` : ''}
                            ${result.has_txt ? `<button class="btn btn-info btn-sm" onclick="downloadFile('${result.name}', 'txt')">📝 Скачать TXT</button>` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteResult('${result.name}')">🗑️ Удалить</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function downloadFile(resultName, fileType) {
            try {
                const response = await fetch(`/api/results/download/${resultName}/${fileType}`);
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${resultName}.${fileType}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    showToast(`Downloaded ${fileType.toUpperCase()} file`, 'success');
                } else {
                    const error = await response.json();
                    showToast(`Error: ${error.detail || 'Download failed'}`, 'error');
                }
            } catch (error) {
                console.error('Download error:', error);
                showToast('Error downloading file', 'error');
            }
        }

        async function deleteResult(resultName) {
            if (!confirm(`Вы уверены, что хотите удалить результат "${resultName}"? Это действие невозможно отменить.`)) {
                return;
            }

            try {
                const response = await fetch(`/api/results/delete/${resultName}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast(`Успешно удалено ${resultName}`, 'success');
                    await loadResults();
                } else {
                    const error = await response.json();
                    showToast(`Error: ${error.detail || 'Delete failed'}`, 'error');
                }
            } catch (error) {
                console.error('Delete error:', error);
                showToast('Error deleting result', 'error');
            }
        }

        async function deleteAllResults() {
            if (!confirm('⚠️ ВНИМАНИЕ: это приведет к удалению ВСЕХ результатов! Это действие невозможно отменить. Вы абсолютно уверены?')) {
                return;
            }

            try {
                const response = await fetch('/api/results/delete-all', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const data = await response.json();
                    showToast(data.message, 'success');
                    await loadResults();
                } else {
                    const error = await response.json();
                    showToast(`Error: ${error.detail || 'Delete failed'}`, 'error');
                }
            } catch (error) {
                console.error('Delete all error:', error);
                showToast('Error deleting all results', 'error');
            }
        }

        function refreshResults() {
            loadResults();
            showToast('Получаю результаты...', 'info');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load results on page load
        loadResults();

        // Auto-refresh every 30 seconds
        setInterval(refreshResults, 30000);
    </script>
</body>
</html>
